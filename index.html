<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pain, Judgement, Redemption</title>
    
    <!-- Importazione dei font calligrafico e gotico da Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Cinzel', serif; /* Font per il countdown e bottone */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            font-family: 'Great Vibes', cursive; /* Font calligrafico stile cover */
            font-size: 6rem; /* Molto grande per valorizzare i ghirigori */
            font-weight: normal;
            margin-bottom: 10px;
            margin-top: 20px;
            color: #e0e0e0;
            text-shadow: 2px 2px 15px rgba(180, 0, 0, 0.5); /* Alone rosso drammatico */
            /* Niente uppercase: i font corsivi si rovinano se messi tutti in maiuscolo */
        }

        .image-container {
            margin-bottom: 30px;
        }

        img {
            max-width: 90%;
            height: auto;
            width: 450px;
            border-radius: 5px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.9);
            border: 1px solid #222;
        }

        #countdown {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 700;
            color: #8b0000; /* Rosso sangue scuro */
            letter-spacing: 3px;
        }

        .btn {
            text-decoration: none;
            background-color: #ffffff;
            color: #000000;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 2px;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn:hover {
            background-color: #8b0000;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.8);
        }

        /* Responsive per dispositivi mobili */
        @media (max-width: 600px) {
            h1 { font-size: 4rem; }
            #countdown { font-size: 1.5rem; }
            img { width: 300px; }
        }
    </style>
</head>
<body>

    <h1>Pain, Judgement, Redemption.</h1>

    <div class="image-container">
        <!-- Inserisci qui il nome esatto della tua immagine scaricata (es. immagine.jpg o sfondo.png) -->
        <img src="redemption.jpeg" alt="Cover Image">
    </div>

    <div id="countdown">Calcolo del tempo...</div>

    <a href="https://www.instagram.com/camouflagehero?igsh=eGdpd244M2ZnNjAx" class="btn" target="_blank">Scopri di più</a>

    <script>
        // Imposta la data finale: 14 Maggio 2027 all'01:00:00 di notte
        const countDownDate = new Date("May 14, 2027 01:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Aggiunge uno zero davanti ai numeri singoli (es. 09 invece di 9)
            const formatTime = (time) => time < 10 ? "0" + time : time;

            document.getElementById("countdown").innerHTML = 
                days + "G : " + formatTime(hours) + "H : " + formatTime(minutes) + "M : " + formatTime(seconds) + "S";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "REDEMPTION IS HERE.";
            }
        }, 1000);
    </script>

</body>
</html>
