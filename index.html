<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pain, Judgement, Redemption</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* Sfondo quasi nero per dare drammaticità */
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace; /* Font in stile macchina da scrivere/hacker */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #e0e0e0;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.4); /* Leggero alone rosso */
        }

        .image-container {
            margin-bottom: 30px;
        }

        img {
            max-width: 90%;
            height: auto;
            width: 450px;
            border-radius: 5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
        }

        #countdown {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: bold;
            color: #ff3333; /* Colore rosso per il timer */
            letter-spacing: 3px;
        }

        .btn {
            text-decoration: none;
            background-color: #ffffff;
            color: #000000;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 3px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background-color: #ff3333;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.6);
        }

        /* Responsive per dispositivi mobili */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            #countdown { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <h1>PAIN, JUDGEMENT, REDEMPTION.</h1>

    <div class="image-container">
        <!-- SOSTITUISCI IL LINK QUI SOTTO CON QUELLO DELLA TUA IMMAGINE -->
        <img src="redemption.jpg" alt="Immagine di sfondo">
    </div>

    <div id="countdown">Calcolo del tempo...</div>

    <a href="https://www.instagram.com/camouflagehero?igsh=eGdpd244M2ZnNjAx" class="btn" target="_blank">Scopri di più</a>

    <script>
        // Imposta la data finale: 14 Maggio 2027 all'01:00:00 di notte
        const countDownDate = new Date("May 14, 2027 01:00:00").getTime();

        // Aggiorna il countdown ogni secondo (1000 millisecondi)
        const x = setInterval(function() {

            // Ottieni la data e l'ora esatta di oggi
            const now = new Date().getTime();

            // Calcola la distanza tra adesso e la data di fine
            const distance = countDownDate - now;

            // Calcoli matematici per giorni, ore, minuti e secondi
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Costruisci il testo da mostrare
            document.getElementById("countdown").innerHTML = 
                days + "g : " + hours + "h : " + minutes + "m : " + seconds + "s";

            // Cosa succede quando il countdown finisce
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "IL TEMPO È GIUNTO.";
            }
        }, 1000);
    </script>

</body>
</html>
